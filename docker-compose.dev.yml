services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rentalbills
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  qorstack-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qorstack_report
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qorstack-dev-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qorstack-postgres-data:/var/lib/postgresql/data

  qorstack-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qorstackdev
      MINIO_ROOT_PASSWORD: qorstack-dev-password
    ports:
      - "9100:9000"
      - "9101:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qorstack-minio-data:/data

  qorstack-gotenberg:
    image: qorstack/gotenberg:8
    command:
      - gotenberg
      - --api-port=3000
      - --log-level=warn
      - --libreoffice-auto-start=true
      - --libreoffice-restart-after=100
      - --api-disable-health-check-logging=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qorstack-backend:
    image: qorstack/report-api:latest
    depends_on:
      qorstack-postgres:
        condition: service_healthy
      qorstack-minio:
        condition: service_healthy
      qorstack-gotenberg:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Admin__Email: admin@example.com
      Admin__Password: admin
      ConnectionStrings__DefaultConnection: Host=qorstack-postgres;Port=5432;Database=qorstack_report;Username=postgres;Password=qorstack-dev-password
      Database__MigrationPaths__0: database
      Minio__Endpoint: qorstack-minio:9000
      Minio__PublicEndpoint: http://localhost:9100
      Minio__AccessKey: qorstackdev
      Minio__SecretKey: qorstack-dev-password
      Minio__UseSsl: "false"
      Minio__TemplateBucket: template
      Minio__ReportBucket: report
      Gotenberg__BaseUrl: http://qorstack-gotenberg:3000
      Jwt__Key: local-dev-jwt-key-at-least-32-characters
      Jwt__Issuer: qorstack-report
      Jwt__Audience: qorstack-report
      Encryption__Key: local-dev-encryption-key-32chars
      Encryption__IV: local-dev-iv-123
      Cors__AllowedOriginsString: http://localhost:3001
    ports:
      - "18080:8080"

  qorstack-frontend:
    image: qorstack/report-web:latest
    depends_on:
      - qorstack-backend
    environment:
      NEXT_PUBLIC_SERVICE: http://localhost:18080
    ports:
      - "3001:3000"

volumes:
  postgres-data:
  qorstack-postgres-data:
  qorstack-minio-data:
