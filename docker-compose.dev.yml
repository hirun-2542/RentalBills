services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rentalbills
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  qorstack:
    image: qorstack/report:latest
    ports:
      - "3001:3000"

volumes:
  postgres-data:
